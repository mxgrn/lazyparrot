name: Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    name: Deploy
    strategy:
      matrix:
        app: [lazyparrot]
        env: [prod]
        os: [ubuntu-latest]
        port: [8200]
        username: [deploy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ghcr.io/mxgrn/${{matrix.app}}_${{matrix.env}}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pull image on host, restart, run migrations
        uses: appleboy/ssh-action@v1
        with:
          host: "49.12.187.176,5.75.226.35"
          username: ${{matrix.username}}
          key: ${{ secrets.DEPLOYMENT_KEY }}
          script: |
            set -e
            echo "${{secrets.GITHUB_TOKEN}}" | docker login https://ghcr.io -u ${{github.actor}} --password-stdin
            docker pull ghcr.io/mxgrn/${{matrix.app}}_${{matrix.env}}
            docker stop ${{matrix.app}}_${{matrix.env}} || true
            docker rm ${{matrix.app}}_${{matrix.env}} || true
            docker run --name=${{matrix.app}}_${{matrix.env}} -d -p ${{matrix.port}}:4000 \
              --restart always \
              --log-driver=fluentd \
              -e PHX_SERVER=true \
              -e SECRET_KEY_BASE=${{secrets.SECRET_KEY_BASE}} \
              -e DATABASE_URL=${{secrets.DATABASE_URL}} \
              -e GITHUB_SHA=${{github.sha}} \
              -e TELEGRAM_BOT_TOKEN=${{secrets.TELEGRAM_BOT_TOKEN}} \
              -e GOOGLE_API_KEY=${{secrets.GOOGLE_API_KEY}} \
              -e PROD_ENV=${{matrix.env}} \
              -e HOSTNAME=`hostname` \
              -e PHX_HOST=lazyparrot.mxgrn.com \
              ghcr.io/mxgrn/${{matrix.app}}_${{matrix.env}}
            for i in {1..60}; do curl localhost:${{matrix.port}}/health && break || { [ $i -eq 60 ] && echo "Failed after 60 attempts" && exit 1 || sleep 1; }; done
            docker exec ${{matrix.app}}_${{matrix.env}} /app/bin/migrate
